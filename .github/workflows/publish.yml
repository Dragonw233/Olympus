name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish:
        description: Force a publish even if the version did not change
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip publish]') }}
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # 1. Detect version change — skip pipeline if version unchanged
      # ------------------------------------------------------------------
      - name: Detect Version Change
        id: version
        shell: pwsh
        run: |
          $versionPath = 'Olympus.csproj'
          $currentContent = Get-Content $versionPath -Raw
          $currentVersion = [regex]::Match($currentContent, '<Version>([^<]+)</Version>').Groups[1].Value

          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw 'Unable to read <Version> from Olympus.csproj'
          }

          $forcePublish = '${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.force_publish }}' -eq 'true'
          $changed = $true

          if (-not $forcePublish -and (git rev-list --count HEAD) -gt 1) {
            $previousContent = git show HEAD^:$versionPath 2>$null
            if ($LASTEXITCODE -eq 0 -and $previousContent) {
              $previousVersion = [regex]::Match($previousContent, '<Version>([^<]+)</Version>').Groups[1].Value
              if ($previousVersion -eq $currentVersion) {
                $changed = $false
              }
            }
          }

          "current=$currentVersion" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          "changed=$($changed.ToString().ToLowerInvariant())" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Stop Early If Version Unchanged
        if: steps.version.outputs.changed != 'true'
        shell: pwsh
        run: Write-Host 'Version unchanged. Skipping publish pipeline.'

      # ------------------------------------------------------------------
      # 2. Build
      # ------------------------------------------------------------------
      - name: Set up .NET
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Download Dalamud Latest
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncherCN\Addon\Hooks\dev"
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore NuGet Packages
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: dotnet restore Olympus.csproj

      - name: Build Release-Pro Package
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          dotnet build --no-restore -c Release-Pro Olympus.csproj `
            -p:AssemblyVersion=${{ steps.version.outputs.current }} `
            -p:FileVersion=${{ steps.version.outputs.current }} `
            -p:PackageVersion=${{ steps.version.outputs.current }} `
            -p:InformationalVersion=${{ steps.version.outputs.current }} `
            --output .\build

      # ------------------------------------------------------------------
      # 3. Ensure Olympus.json is in build output for DalamudPlugins scanner
      # ------------------------------------------------------------------
      - name: Copy Olympus.json and Localization Files to Build Output
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          # Copy Olympus.json (plugin manifest)
          if (Test-Path .\Olympus.json) {
            Copy-Item .\Olympus.json .\build\Olympus.json -Force
          }
          
          # Copy localization files
          if (Test-Path .\Localization\Loc\) {
            New-Item -ItemType Directory -Force -Path .\build\Localization\Loc | Out-Null
            Copy-Item .\Localization\Loc\*.json .\build\Localization\Loc\ -Force
          }

      - name: Pack Release Zip
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          if (Test-Path .\build\latest.zip) {
            Remove-Item .\build\latest.zip -Force
          }
          Compress-Archive -Path .\build\* -DestinationPath .\build\latest.zip

      # ------------------------------------------------------------------
      # 4. Create GitHub Release (latest.zip attach to release)
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.current }}
          files: ./build/latest.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 5. Push latest.zip to DalamudPlugins & regenerate pluginmaster.json
      # ------------------------------------------------------------------
      - name: Update DalamudPlugins
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          GITHUB_REF: refs/heads/master
        shell: pwsh
        run: |
          # Clone DalamudPlugins repo
          git clone https://x-access-token:$env:PUSH_TOKEN@github.com/Dragonw233/DalamudPlugins.git .\dalamud-plugins

          # Copy latest.zip to plugins/Olympus/
          New-Item -ItemType Directory -Force -Path .\dalamud-plugins\plugins\Olympus | Out-Null
          Copy-Item .\build\latest.zip .\dalamud-plugins\plugins\Olympus\latest.zip -Force

          # Regenerate pluginmaster.json
          python generate_pluginmaster.py

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins\Olympus\latest.zip pluginmaster.json
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update Olympus to ${{ steps.version.outputs.current }}"
            git push origin HEAD:master
          } else {
            Write-Host "No changes to commit in DalamudPlugins."
          }

      # ------------------------------------------------------------------
      # 6. Bump version in Olympus.csproj for next release
      # ------------------------------------------------------------------
      - name: Bump Next Version
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        shell: pwsh
        run: |
          $parts = "${{ steps.version.outputs.current }}".Split('.')
          if ($parts.Count -lt 1) {
            throw 'Version format is invalid'
          }

          $parts[$parts.Count - 1] = ([int]$parts[$parts.Count - 1] + 1).ToString()
          $nextVersion = $parts -join '.'

          $versionPath = 'Olympus.csproj'
          $content = Get-Content $versionPath -Raw
          $updated = [regex]::Replace($content, '<Version>[^<]+</Version>', "<Version>$nextVersion</Version>", 1)

          if ($updated -eq $content) {
            throw 'Failed to update version in Olympus.csproj'
          }

          Set-Content -Path $versionPath -Value $updated -NoNewline

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $versionPath
          git commit -m "Bump version to $nextVersion [skip publish]"

          $remote = "https://x-access-token:$env:PUSH_TOKEN@github.com/${{ github.repository }}.git"
          git remote set-url origin $remote
          git push origin HEAD:main

      # ------------------------------------------------------------------
      # 7. Trigger post-bump build (build.yml on the new commit)
      # ------------------------------------------------------------------
      - name: Trigger Post-Bump Build
        if: steps.version.outputs.changed == 'true'
        env:
          PUSH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        shell: pwsh
        run: |
          $headers = @{
            Authorization = "token $env:PUSH_TOKEN"
            Accept        = "application/vnd.github+json"
            "User-Agent"  = "Olympus-Publish"
          }

          $body = @{ event_type = "post-bump-build" } | ConvertTo-Json

          Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/dispatches" `
            -Headers $headers `
            -Body $body `
            -ContentType "application/json"
